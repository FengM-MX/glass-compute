<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼镜镜片厚度简易计算器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h4 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #009999;
            color: white;
        }
        .form-section {
            background-color: #eeeeff;
            padding: 20px;
            border-radius: 4px;
        }
        .result-section {
            display: none;
            background-color: #eeeeff;
            padding: 20px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .button {
            background-color: #009999;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px;
            border-radius: 4px;
        }
        .button:hover {
            background-color: #007777;
        }
        select, input {
            padding: 5px;
            margin: 5px;
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 10px 0;
        }
        .step-indicator {
            background-color: #cccccc;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h4>眼镜镜片厚度简易计算器</h4>
        
        <!-- 步骤指示器 -->
        <div class="step-indicator">
            输入参数 >> 计算结果
        </div>
        
        <!-- 输入表单 -->
        <div class="form-section">
            <p>中心距离 = <input type="text" id="distance" value="29" readonly style="width: 50px;"> 毫米</p>
            <p>镜片材质 选择 >> <select id="material" style="width: 160px;">
                <option value="">--请选择--</option>
                <option value="塑料">塑料</option>
                <option value="玻璃">玻璃</option>
            </select></p>
            <p>度数 选择 >> <select id="power" style="width: 160px;">
                <option value="">--请选择--</option>
                <option value="-1.00">-1.00</option>
                <option value="-1.25">-1.25</option>
                <option value="-1.50">-1.50</option>
                <option value="-1.75">-1.75</option>
                <option value="-2.00">-2.00</option>
                <option value="-2.25">-2.25</option>
                <option value="-2.50">-2.50</option>
                <option value="-2.75">-2.75</option>
                <option value="-3.00">-3.00</option>
                <option value="-3.25">-3.25</option>
                <option value="-3.50">-3.50</option>
                <option value="-3.75">-3.75</option>
                <option value="-4.00">-4.00</option>
                <option value="-4.25">-4.25</option>
                <option value="-4.50">-4.50</option>
                <option value="-4.75">-4.75</option>
                <option value="-5.00">-5.00</option>
                <option value="-5.25">-5.25</option>
                <option value="-5.50">-5.50</option>
                <option value="-5.75">-5.75</option>
                <option value="-6.00">-6.00</option>
                <option value="-6.25">-6.25</option>
                <option value="-6.50">-6.50</option>
                <option value="-6.75">-6.75</option>
                <option value="-7.00">-7.00</option>
                <option value="-7.25">-7.25</option>
                <option value="-7.50">-7.50</option>
                <option value="-7.75">-7.75</option>
                <option value="-8.00">-8.00</option>
                <option value="-8.25">-8.25</option>
                <option value="-8.50">-8.50</option>
                <option value="-8.75">-8.75</option>
                <option value="-9.00">-9.00</option>
                <option value="-9.25">-9.25</option>
                <option value="-9.50">-9.50</option>
                <option value="-9.75">-9.75</option>
                <option value="-10.00">-10.00</option>
            </select></p>
            <img src="img/01.gif" alt="输入参数图片">
            <img src="img/calculating.gif" alt="计算中图片">
            <br>
            <button class="button" onclick="calculate()">镜片厚度计算</button>
        </div>
        
        <!-- 结果显示 -->
        <div id="result-section" class="result-section">
            <h4>计算结果</h4>
            <p id="result-params"></p>
            <table border="1" cellpadding="8" bgcolor="#009999">
                <tbody>
                    <tr>
                        <td bgcolor="#ffffff">屈折率·设计</td>
                        <td bgcolor="#ffffff">中心厚</td>
                        <td bgcolor="#ffffff">周边厚</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.76 非球面</td>
                        <td bgcolor="#ffffff">1.0</td>
                        <td bgcolor="#ffffff">3.4</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.74 非球面</td>
                        <td bgcolor="#ffffff">1.0</td>
                        <td bgcolor="#ffffff">3.6</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.70 非球面</td>
                        <td bgcolor="#ffffff">1.0</td>
                        <td bgcolor="#ffffff">3.6</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.67 非球面</td>
                        <td bgcolor="#ffffff">1.1</td>
                        <td bgcolor="#ffffff">3.9</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.60 非球面</td>
                        <td bgcolor="#ffffff">1.3</td>
                        <td bgcolor="#ffffff">4.4</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.60 球面</td>
                        <td bgcolor="#ffffff">1.3</td>
                        <td bgcolor="#ffffff">4.6</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.50 非球面</td>
                        <td bgcolor="#ffffff">1.6</td>
                        <td bgcolor="#ffffff">5.4</td>
                    </tr>
                    <tr>
                        <td bgcolor="#ffffff">1.50 球面</td>
                        <td bgcolor="#ffffff">2.0</td>
                        <td bgcolor="#ffffff">6.1</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function calculate() {
            const material = document.getElementById('material').value;
            const power = document.getElementById('power').value;
            const distance = document.getElementById('distance').value;
            
            if (!material || !power) {
                alert('请选择材质和度数');
                return;
            }
            
            document.getElementById('result-params').innerHTML = 
                '中心距离 = ' + distance + ' 毫米<br><br>' +
                '镜片材质 = ' + material + '<br><br>' +
                '度数 = ' + power;
            
            document.getElementById('result-section').style.display = 'block';
        }
    </script>
</body>
</html>
