<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼镜边框计算器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "微软雅黑", "Arial", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff;
            background-image: linear-gradient(135deg, #e6f7ff 0%, #f0f8ff 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 153, 153, 0.2);
            border: 1px solid #009999;
        }

        .content-wrapper {
            display: flex;
            gap: 30px;
        }

        .form-section {
            flex: 3;
        }

        .form-image {
            text-align: center;
            margin: 20px 0;
        }

        .form-image img {
            width: 400px;
            height: 400px;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 153, 153, 0.2);
        }
        h1 {
            color: #006666;
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0, 102, 102, 0.1);
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f0ffff;
            border-radius: 10px;
            border: 1px solid #00cccc;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #006666;
            font-size: 16px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #00cccc;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #009999;
            box-shadow: 0 0 8px rgba(0, 153, 153, 0.3);
        }
        button {
            background-color: #009999;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 102, 102, 0.2);
        }
        button:hover {
            background-color: #007777;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 102, 102, 0.3);
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background-color: #f0ffff;
            border-radius: 10px;
            border: 1px solid #00cccc;
            display: none;
        }

        .result-content-wrapper {
            display: flex;
            gap: 30px;
        }

        .result-info {
            flex: 3;
        }

        .result-image {
            text-align: center;
            margin: 20px 0;
        }

        .result-image img {
            width: 400px;
            height: 400px;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 153, 153, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 153, 153, 0.1);
        }
        th, td {
            border: 1px solid #00cccc;
            padding: 12px;
            text-align: center;
            font-size: 15px;
        }
        th {
            background-color: #009999;
            color: white;
            font-weight: bold;
        }
        .navigation {
            margin-top: 25px;
            text-align: center;
        }
        .navigation a {
            margin: 0 15px;
            text-decoration: none;
            color: #009999;
            font-weight: bold;
            font-size: 16px;
            padding: 8px 15px;
            border: 2px solid #009999;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .navigation a:hover {
            background-color: #009999;
            color: white;
            transform: scale(1.05);
        }
        .gif-container {
            text-align: center;
            margin: 25px 0;
        }
        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 153, 153, 0.2);
        }
        .result-info {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e6f7ff;
            border-radius: 8px;
            border-left: 4px solid #009999;
        }
        .result-info p {
            margin: 8px 0;
            font-size: 16px;
            color: #006666;
        }
        .step-indicator {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #009999;
            font-size: 18px;
            padding: 8px;
            background-color: #e6f7ff;
            border-radius: 8px;
        }
        .header-icon {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-icon img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #009999;
            box-shadow: 0 4px 8px rgba(0, 153, 153, 0.3);
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: stretch;
        }
        .input-full {
            grid-column: 1 / -1;
        }
        @media (max-width: 600px) {
            .input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        function calculate() {
            const pupilDistance = document.getElementById('pupilDistance').value;
            const frameWidth = document.getElementById('frameWidth').value;
            const noseDistance = document.getElementById('noseDistance').value;
            const lensMaterial = document.getElementById('lensMaterial').value;
            const lensType = document.getElementById('lensType').value;
            const degree = document.getElementById('degree').value;

            if (!pupilDistance || !frameWidth || !noseDistance || !lensMaterial || !lensType || !degree) {
                alert('请填写所有参数！');
                return;
            }

            // 更新结果信息
            document.getElementById('resultPupilDistance').textContent = pupilDistance;
            document.getElementById('resultFrameWidth').textContent = frameWidth;
            document.getElementById('resultNoseDistance').textContent = noseDistance;
            document.getElementById('resultLensMaterial').textContent = lensMaterial === 'plastic' ? '塑料' :
                                                                 lensMaterial === 'glass' ? '玻璃' :
                                                                 lensMaterial === 'polycarbonate' ? '聚碳酸酯' : 'Trivex';
            document.getElementById('resultLensType').textContent = lensType.replace('-', ' ').replace('aspheric', '非球面').replace('spheric', '球面');
            document.getElementById('resultDegree').textContent = degree;

            // 显示结果部分
            document.getElementById('resultSection').style.display = 'block';
        }

        function resetCalculator() {
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('pupilDistance').value = '64';
            document.getElementById('frameWidth').value = '140';
            document.getElementById('noseDistance').value = '20';
            document.getElementById('lensMaterial').value = 'plastic';
            document.getElementById('lensType').value = '1.76-aspheric';
            document.getElementById('degree').value = '';
        }
    </script>
